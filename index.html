  <style>
    * { font-family: 'Inter', sans-serif; }
    body { background: #0a0e17; color: #f0f6fc; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0a0e17; }
    ::-webkit-scrollbar-thumb { background: #2a3144; border-radius: 3px; }
    .skeleton { background: linear-gradient(90deg, #1c2333 25%, #2a3144 50%, #1c2333 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeIn 0.25s ease-out; }
    @keyframes pop { 0% { transform: scale(0.9); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    .pop-in { animation: pop 0.3s ease-out; }
    @keyframes pulse-glow { 0%, 100% { box-shadow: 0 0 5px rgba(0,200,5,0.3); } 50% { box-shadow: 0 0 20px rgba(0,200,5,0.6); } }
    .glow-green { animation: pulse-glow 2s ease-in-out infinite; }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type="number"] { -moz-appearance: textfield; }
    .chart-container { position: relative; width: 100%; }
    input, select { background: #1c2333; border: 1px solid #2a3144; color: #f0f6fc; }
    input:focus, select:focus { outline: none; border-color: #00c805; box-shadow: 0 0 0 2px rgba(0,200,5,0.2); }
    input::placeholder { color: #4a5568; }
  </style>

    // ─── Price Fetching ────────────────────────────────────────────────
    // Batch fetch current prices from Yahoo Finance
    async function fetchPricesBatch(tickers, onProgress) {
      const cached = loadPrices();
      const results = { ...cached };
      const batchSize = 25;
      let fetched = 0;

      for (let i = 0; i < tickers.length; i += batchSize) {
        const batch = tickers.slice(i, i + batchSize);
        const symbols = batch.join(',');
        const urls = [
          `https://corsproxy.io/?https://query1.finance.yahoo.com/v8/finance/spark?symbols=${symbols}&range=1mo&interval=1d`,
          `https://api.allorigins.win/raw?url=${encodeURIComponent(`https://query1.finance.yahoo.com/v8/finance/spark?symbols=${symbols}&range=1mo&interval=1d`)}`,
        ];

        for (const url of urls) {
          try {
            const resp = await fetch(url, { signal: AbortSignal.timeout(10000) });
            if (!resp.ok) continue;
            const data = await resp.json();
            if (data.spark?.result) {
              for (const item of data.spark.result) {
                const sym = item.symbol;
                const rawCloses = item.response?.[0]?.indicators?.quote?.[0]?.close || [];
                const rawTimestamps = item.response?.[0]?.timestamp || [];
                // Filter out nulls while keeping timestamps aligned
                const closes = [];
                const timestamps = [];
                for (let k = 0; k < rawCloses.length; k++) {
                  if (rawCloses[k] != null) {
                    closes.push(rawCloses[k]);
                    timestamps.push(rawTimestamps[k] ? rawTimestamps[k] * 1000 : Date.now());
                  }
                }
                if (closes.length > 0) {
                  results[sym] = {
                    price: closes[closes.length - 1],
                    previousClose: closes.length > 1 ? closes[closes.length - 2] : closes[0],
                    sparkline: closes,
                    sparklineTimestamps: timestamps,
                    lastUpdated: new Date().toISOString(),
                  };
                }
              }
              break; // Success, skip fallback URL
            }
          } catch (e) { continue; }
        }

        fetched += batch.length;
        if (onProgress) onProgress(fetched, tickers.length);
        // Small delay between batches to avoid rate limiting
        if (i + batchSize < tickers.length) {
          await new Promise(r => setTimeout(r, 300));
        }
      }

      savePrices(results);
      return results;
    }

    // Fetch Nov 2017 historical prices to set purchase prices
    async function fetchHistoricalPrices(tickers, onProgress) {
      const results = {};
      // Unix timestamp for Nov 1, 2017 and Nov 10, 2017
      const period1 = 1509494400;
      const period2 = 1510358400;
      let fetched = 0;

      // Process in batches of 5 (individual chart requests)
      const batchSize = 5;
      for (let i = 0; i < tickers.length; i += batchSize) {
        const batch = tickers.slice(i, i + batchSize);
        const promises = batch.map(async (ticker) => {
          try {
            const url = `https://corsproxy.io/?https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?period1=${period1}&period2=${period2}&interval=1d`;
            const resp = await fetch(url, { signal: AbortSignal.timeout(8000) });
            if (resp.ok) {
              const data = await resp.json();
              const closes = data.chart?.result?.[0]?.indicators?.quote?.[0]?.close?.filter(c => c != null) || [];
              if (closes.length > 0) {
                results[ticker] = closes[0]; // First available close price
              }
            }
          } catch (e) { /* skip */ }
        });

        await Promise.all(promises);
        fetched += batch.length;
        if (onProgress) onProgress(fetched, tickers.length);
        if (i + batchSize < tickers.length) {
          await new Promise(r => setTimeout(r, 500));
        }
      }

      return results;
    }

      const results = {};
      const batchSize = 25;
      for (let i = 0; i < tickers.length; i += batchSize) {
        const batch = tickers.slice(i, i + batchSize);
        const symbols = batch.join(',');
        const urls = [
          `https://corsproxy.io/?https://query1.finance.yahoo.com/v8/finance/spark?symbols=${symbols}&range=${range}&interval=${interval}`,
          `https://api.allorigins.win/raw?url=${encodeURIComponent(`https://query1.finance.yahoo.com/v8/finance/spark?symbols=${symbols}&range=${range}&interval=${interval}`)}`,
        ];
        for (const url of urls) {
          try {
            const resp = await fetch(url, { signal: AbortSignal.timeout(12000) });
            if (!resp.ok) continue;
            const data = await resp.json();
            if (data.spark?.result) {
              for (const item of data.spark.result) {
                const sym = item.symbol;
                const r = item.response?.[0];
                const timestamps = r?.timestamp || [];
                const closes = r?.indicators?.quote?.[0]?.close || [];
                if (timestamps.length > 0) {
                  results[sym] = { timestamps, closes };
                }
              }
              break;
            }
          } catch (e) { continue; }
        }
        if (i + batchSize < tickers.length) {
          await new Promise(r => setTimeout(r, 300));
        }
      }
      return results;

    const CHART_HORIZONS = [
      { key: '1W', range: '5d', interval: '1d', label: '1W' },
      { key: '1M', range: '1mo', interval: '1d', label: '1M' },
      { key: '3M', range: '3mo', interval: '1d', label: '3M' },
      { key: '6M', range: '6mo', interval: '1wk', label: '6M' },

    function LineChartComponent({ lots, prices }) {
      const canvasRef = useRef(null);
      const chartRef = useRef(null);
      const [horizon, setHorizon] = useState('1M');
      const [rangeData, setRangeData] = useState({}); // { '1M': { AAPL: {closes,timestamps}, ... }, ... }
      const [loading, setLoading] = useState(false);

      // Get unique tickers that have positions
      const activeTickers = useMemo(() => {
        const set = new Set();
        lots.forEach(l => { if (l.purchasePrice > 0) set.add(l.ticker); });
        return [...set];
      }, [lots]);

      // For 1M, use already-loaded sparkline data from prices (no extra fetch)
      const defaultData = useMemo(() => {
        const result = {};
        activeTickers.forEach(ticker => {
          const p = prices[ticker];
          if (p?.sparkline?.length > 0 && p?.sparklineTimestamps?.length > 0) {
            result[ticker] = { closes: p.sparkline, timestamps: p.sparklineTimestamps };
          }
        });
        return result;
      }, [activeTickers, prices]);

      // Fetch data when horizon changes (1M uses cached sparkline data)
      useEffect(() => {
        if (horizon === '1M') return; // Use defaultData
        if (rangeData[horizon]) return; // Already fetched
        if (activeTickers.length === 0) return;

        const h = CHART_HORIZONS.find(h => h.key === horizon);
        if (!h) return;

        setLoading(true);
        fetchSparkRange(activeTickers, h.range, h.interval).then(raw => {
          // Convert fetchSparkRange format (timestamps in seconds) to ms format
          const data = {};
          Object.entries(raw).forEach(([ticker, d]) => {
            const closes = [], timestamps = [];
            for (let k = 0; k < d.closes.length; k++) {
              if (d.closes[k] != null) {
                closes.push(d.closes[k]);
                timestamps.push((d.timestamps[k] || 0) * 1000);
              }
            }
            if (closes.length > 0) data[ticker] = { closes, timestamps };
          });
          setRangeData(prev => ({ ...prev, [horizon]: data }));
          setLoading(false);
        }).catch(() => setLoading(false));
      }, [horizon, activeTickers]);

      // Build chart whenever horizon/data changes
      useEffect(() => {
        if (!canvasRef.current || lots.length === 0) return;
        const activeLots = lots.filter(l => l.purchasePrice > 0);
        if (activeLots.length === 0) return;

        // Get the right data source
        const tickerData = horizon === '1M' ? defaultData : (rangeData[horizon] || {});
        if (Object.keys(tickerData).length === 0) return;

        // Find the common set of timestamps (use the longest sparkline's timestamps)
        let refTimestamps = [];
        let maxLen = 0;
        for (const ticker of Object.keys(tickerData)) {
          const td = tickerData[ticker];
          if (td.timestamps.length > maxLen) {
            maxLen = td.timestamps.length;
            refTimestamps = td.timestamps;
          }
        }
        if (refTimestamps.length === 0) return;

        // For each timestamp, compute portfolio value and cost basis
        const labels = [];
        const valueData = [];
        const investedData = [];

        // Determine date format based on horizon
        const dateFmt = horizon === '1W' || horizon === '1M'
          ? { month: 'short', day: 'numeric' }
          : horizon === '3M' || horizon === '6M'
          ? { month: 'short', day: 'numeric' }
          : { month: 'short', year: '2-digit' };

        for (let i = 0; i < refTimestamps.length; i++) {
          const ts = refTimestamps[i];
          const date = new Date(ts);
          labels.push(date.toLocaleDateString('en-US', dateFmt));

          let totalValue = 0;
          let totalInvested = 0;

          activeLots.forEach(lot => {
            const lotDate = new Date(lot.date).getTime();
            // Only count lot if it was purchased before this date
            if (lotDate <= ts + 86400000) { // +1 day tolerance
              totalInvested += lot.shares * lot.purchasePrice;

              const td = tickerData[lot.ticker];
              if (td && td.closes.length > 0) {
                // Find the price at this index (align from the right if different lengths)
                const offset = refTimestamps.length - td.closes.length;
                const idx = i - offset;
                if (idx >= 0 && idx < td.closes.length) {
                  totalValue += lot.shares * td.closes[idx];
                } else if (idx < 0) {
                  // Before this ticker's data starts, use earliest available price
                  totalValue += lot.shares * td.closes[0];
                } else {
                  totalValue += lot.shares * td.closes[td.closes.length - 1];
                }
              } else {
                // No sparkline data for this ticker, use purchase price
                totalValue += lot.shares * (prices[lot.ticker]?.price || lot.purchasePrice);
              }
            }
          });

          investedData.push(totalInvested);
          valueData.push(totalValue);
        }

        // Smart Y-axis formatting
        const allVals = [...valueData, ...investedData].filter(v => v > 0);
        const minVal = Math.min(...allVals);
        const maxVal = Math.max(...allVals);
        const range = maxVal - minVal;

        const formatY = (v) => {
          if (range < 100) return '$' + v.toFixed(2);
          if (range < 1000) return '$' + v.toFixed(0);
          if (v >= 1000000) return '$' + (v / 1000000).toFixed(1) + 'M';
          if (v >= 10000) return '$' + (v / 1000).toFixed(1) + 'k';
          return '$' + v.toLocaleString('en-US', { maximumFractionDigits: 0 });
        };

        if (chartRef.current) chartRef.current.destroy();
        chartRef.current = new Chart(canvasRef.current, {
          type: 'line',
          data: {
            labels,
            datasets: [
              { label: "Portfolio Value", data: valueData, borderColor: '#00c805', backgroundColor: 'rgba(0,200,5,0.08)', fill: true, tension: 0.3, pointRadius: 0, borderWidth: 2 },
              { label: "Cost Basis", data: investedData, borderColor: '#4a5568', backgroundColor: 'rgba(74,85,104,0.05)', fill: false, tension: 0.1, pointRadius: 0, borderWidth: 1.5, borderDash: [4, 3] }
            ]
          },
          options: {
            responsive: true, maintainAspectRatio: false,
            interaction: { intersect: false, mode: 'index' },
            plugins: {
              legend: { labels: { font: { weight: '600', size: 11 }, usePointStyle: true, padding: 16, color: '#f0f6fc' } },
              tooltip: { callbacks: { label: c => ` ${c.dataset.label}: ${formatCurrency(c.parsed.y)}` } }
            },
            scales: {
              y: {
                ticks: { callback: formatY },
                grid: { color: '#1c233380' },
                // Don't start at zero — show actual range
                beginAtZero: false,
              },
              x: { ticks: { maxTicksLimit: 10, font: { size: 10 } }, grid: { display: false } }
            }
          }
        });
        return () => { if (chartRef.current) chartRef.current.destroy(); };
      }, [lots, prices, horizon, defaultData, rangeData]);

      return (
        <div>
          <div className="flex gap-1 mb-3 flex-wrap">
            {CHART_HORIZONS.map(h => (
              <button
                key={h.key}
                onClick={() => setHorizon(h.key)}
                className={`px-3 py-1 rounded-full text-xs font-semibold transition-all ${
                  horizon === h.key
                    ? 'bg-green-500 text-white'
                    : 'bg-rh-hover text-rh-muted hover:text-rh-text'
                }`}
              >
                {h.label}
              </button>
            ))}
          </div>
          {loading && <div className="text-xs text-rh-muted mb-2 animate-pulse">⏳ Loading {horizon} data...</div>}
          <div className="chart-container" style={{height:'280px'}}><canvas ref={canvasRef}/></div>
        </div>
      );
    }

    function SparklineChart({ data, color, width = 100, height = 32 }) {
      const canvasRef = useRef(null);
      const chartRef = useRef(null);
      useEffect(() => {
        if (!canvasRef.current || !data || data.length < 2) return;
        if (chartRef.current) chartRef.current.destroy();
        chartRef.current = new Chart(canvasRef.current, {
          type: 'line',
          data: { labels: data.map((_, i) => i), datasets: [{ data, borderColor: color || '#00c805', borderWidth: 1.5, pointRadius: 0, tension: 0.4, fill: false }] },
          options: { responsive: false, plugins: { legend: { display: false }, tooltip: { enabled: false } }, scales: { x: { display: false }, y: { display: false } } }
        });
        return () => { if (chartRef.current) chartRef.current.destroy(); };
      }, [data, color]);
      return <canvas ref={canvasRef} width={width} height={height} />;
    }

    // ─── Loading / Initialization Screen ───────────────────────────────
    function InitScreen({ progress, total, phase }) {
