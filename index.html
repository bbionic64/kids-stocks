    // ─── Portfolio Summary ─────────────────────────────────────────────
    function PortfolioSummary({ stocks, prices, lots }) {
      let totalInvested = 0, totalValue = 0, stocksUp = 0, stocksDown = 0;
      stocks.forEach(s => {
        if (s.avgCost <= 0) return;
        const cost = s.avgCost * s.totalShares;
        totalInvested += cost;
        const p = prices[s.ticker]?.price;
        totalValue += p ? p * s.totalShares : cost;
        if (p) { p * s.totalShares > cost ? stocksUp++ : stocksDown++; }
      });
      const totalGain = totalValue - totalInvested;
      const totalPct = totalInvested > 0 ? (totalGain / totalInvested) * 100 : 0;
      const isGain = totalGain >= 0;

      return (
        <div className="mb-6 fade-in">
          <div className="flex items-end gap-3 mb-1">
            <h2 className="text-4xl font-black tracking-tight">{formatCurrency(totalValue)}</h2>
          </div>
          <div className="flex items-center gap-2 mb-4">
            <span className={`text-lg font-bold ${isGain ? 'text-rh-green' : 'text-rh-red'}`}>
              {isGain ? '▲' : '▼'} {formatCurrency(Math.abs(totalGain))} ({formatPercent(totalPct)})
            </span>
            <span className="text-rh-dim text-sm">all time</span>
          </div>
          <div className="grid grid-cols-3 gap-3">
            <div className="bg-rh-card border border-rh-border rounded-xl p-3 text-center">
              <p className="text-2xl font-black text-rh-green">{stocksUp}</p>
              <p className="text-xs text-rh-dim font-semibold">Winners</p>
            </div>
            <div className="bg-rh-card border border-rh-border rounded-xl p-3 text-center">
              <p className="text-2xl font-black text-rh-red">{stocksDown}</p>
              <p className="text-xs text-rh-dim font-semibold">Losers</p>
            </div>
            <div className="bg-rh-card border border-rh-border rounded-xl p-3 text-center">
              <p className="text-2xl font-black">{stocks.filter(s => s.avgCost > 0).length}</p>
              <p className="text-xs text-rh-dim font-semibold">Holdings</p>
            </div>
          </div>
        </div>
      );
    }

    // ─── Stock Table Row ───────────────────────────────────────────────
    function StockRow({ stock, priceInfo, onClick, rank }) {
      const currentPrice = priceInfo?.price;
      const totalCost = stock.avgCost * stock.totalShares;
      const currentValue = currentPrice ? currentPrice * stock.totalShares : totalCost;
      const gainLoss = currentValue - totalCost;
      const gainLossPct = totalCost > 0 ? (gainLoss / totalCost) * 100 : 0;
      const isGain = gainLoss >= 0;
      const dayChange = priceInfo?.previousClose ? ((currentPrice - priceInfo.previousClose) / priceInfo.previousClose * 100) : 0;

      return (
        <tr onClick={onClick} className="border-b border-rh-border/50 hover:bg-rh-surface/50 cursor-pointer transition-colors group">
          <td className="py-3 px-3">
            <div className="flex items-center gap-2">
              <span className="text-sm">{getEmoji(stock.ticker)}</span>
              <div>
                <p className="font-bold text-sm">{stock.ticker}</p>
                <p className="text-xs text-rh-dim truncate max-w-[120px] sm:max-w-[200px]">{stock.companyName}</p>
              </div>
            </div>
          </td>
          <td className="py-3 px-2 hidden sm:table-cell">
            {priceInfo?.sparkline && <SparklineChart data={priceInfo.sparkline} color={isGain ? '#00c805' : '#ff5000'} width={80} height={28} />}
          </td>
          <td className="py-3 px-2 text-right">
            <p className="font-bold text-sm">{currentPrice ? formatCurrency(currentPrice) : '—'}</p>
            <p className={`text-xs font-semibold ${dayChange >= 0 ? 'text-rh-green' : 'text-rh-red'}`}>
              {dayChange !== 0 ? formatPercent(dayChange) : ''}
            </p>
          </td>
          <td className="py-3 px-2 text-right hidden md:table-cell">
            <p className="font-bold text-sm">{formatCurrency(currentValue)}</p>
            <p className="text-xs text-rh-dim">{stock.totalShares} share{stock.totalShares !== 1 ? 's' : ''}</p>
          </td>
          <td className="py-3 px-3 text-right">
            <span className={`inline-block px-2 py-1 rounded-md text-xs font-bold ${isGain ? 'bg-green-900/40 text-rh-green' : 'bg-red-900/40 text-rh-red'}`}>
              {stock.avgCost > 0 ? formatPercent(gainLossPct) : '—'}
            </span>
          </td>
        </tr>
      );
    }

    // ─── Top Movers Cards ──────────────────────────────────────────────
    function TopMovers({ stocks, prices }) {
      const withGains = stocks
        .filter(s => prices[s.ticker]?.price && s.avgCost > 0)
        .map(s => ({ ...s, gainPct: ((prices[s.ticker].price - s.avgCost) / s.avgCost) * 100 }));
      if (withGains.length === 0) return null;

      const sorted = [...withGains].sort((a, b) => b.gainPct - a.gainPct);
      const top3 = sorted.slice(0, 3);
      const bottom3 = sorted.slice(-3).reverse();

      return (
        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-6">
          <div className="bg-rh-card border border-rh-border rounded-xl p-4">
            <h4 className="text-sm font-bold text-rh-green mb-3 flex items-center gap-2">🏆 Top Gainers</h4>
            {top3.map((s, i) => (
              <div key={s.ticker} className="flex items-center justify-between py-2 border-b border-rh-border/30 last:border-0">
                <div className="flex items-center gap-2">
                  <span className="text-rh-dim text-xs font-bold w-4">{i + 1}</span>
                  <span className="text-sm">{getEmoji(s.ticker)}</span>
                  <span className="font-bold text-sm">{s.ticker}</span>
                </div>
                <span className="text-rh-green font-bold text-sm">+{s.gainPct.toFixed(1)}%</span>
              </div>
            ))}
          </div>
          <div className="bg-rh-card border border-rh-border rounded-xl p-4">
            <h4 className="text-sm font-bold text-rh-red mb-3 flex items-center gap-2">📉 Biggest Losers</h4>
            {bottom3.map((s, i) => (
              <div key={s.ticker} className="flex items-center justify-between py-2 border-b border-rh-border/30 last:border-0">
                <div className="flex items-center gap-2">
                  <span className="text-rh-dim text-xs font-bold w-4">{i + 1}</span>
                  <span className="text-sm">{getEmoji(s.ticker)}</span>
                  <span className="font-bold text-sm">{s.ticker}</span>
                </div>
                <span className="text-rh-red font-bold text-sm">{s.gainPct.toFixed(1)}%</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ─── Sort Icon (must be outside component to avoid re-mount) ──────
    function SortIcon({ col, sortBy, sortDir }) {
      if (sortBy !== col) return <span className="text-rh-dim ml-1">↕</span>;
      return <span className="text-rh-green ml-1">{sortDir === 'desc' ? '↓' : '↑'}</span>;
    }

    // ─── Kids Dashboard ────────────────────────────────────────────────
    function KidsDashboard({ lots, stocks, prices, loading, onGoToManage }) {
      const [selectedStock, setSelectedStock] = useState(null);
      const [search, setSearch] = useState('');
      const [sortBy, setSortBy] = useState('gainPct');
      const [sortDir, setSortDir] = useState('desc');

      if (lots.length === 0) return <EmptyState onGoToManage={onGoToManage} />;

      // Compute filtered/sorted stocks directly (no useMemo to avoid re-render loops)
      let filteredStocks = stocks.filter(s => s.avgCost > 0);
      if (search) {
        const q = search.toLowerCase();
        filteredStocks = filteredStocks.filter(s => s.ticker.toLowerCase().includes(q) || s.companyName.toLowerCase().includes(q));
      }
      filteredStocks = [...filteredStocks].sort((a, b) => {
        let aVal, bVal;
        const aPrice = prices[a.ticker]?.price || a.avgCost;
        const bPrice = prices[b.ticker]?.price || b.avgCost;
        switch (sortBy) {
          case 'gainPct':
            aVal = a.avgCost > 0 ? (aPrice - a.avgCost) / a.avgCost : 0;
            bVal = b.avgCost > 0 ? (bPrice - b.avgCost) / b.avgCost : 0;
            break;
          case 'value':
            aVal = aPrice * a.totalShares;
            bVal = bPrice * b.totalShares;
            break;
          case 'ticker':
            aVal = a.ticker; bVal = b.ticker;
            return sortDir === 'asc' ? aVal.localeCompare(bVal) : bVal.localeCompare(aVal);
          case 'price':
            aVal = aPrice; bVal = bPrice;
            break;
          default:
            aVal = 0; bVal = 0;
        }
        return sortDir === 'desc' ? bVal - aVal : aVal - bVal;
      });

      const handleSort = (col) => {
        if (sortBy === col) setSortDir(d => d === 'desc' ? 'asc' : 'desc');
        else { setSortBy(col); setSortDir('desc'); }
      };

      return (
        <div className="max-w-5xl mx-auto p-4 pb-24">
          <PortfolioSummary stocks={stocks} prices={prices} lots={lots} />
          <TopMovers stocks={stocks} prices={prices} />

          {/* Charts section */}
          <div className="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-6">
            <div className="bg-rh-card border border-rh-border rounded-xl p-4">
              <h3 className="font-bold text-sm text-rh-muted mb-3">📊 Performance (Top 20)</h3>
              <BarChartComponent stocks={stocks} prices={prices} />
            </div>
            <div className="bg-rh-card border border-rh-border rounded-xl p-4">
              <h3 className="font-bold text-sm text-rh-muted mb-3">🍕 Allocation (Top 10)</h3>
              <PieChartComponent stocks={stocks} prices={prices} />
            </div>
          </div>

          <div className="bg-rh-card border border-rh-border rounded-xl p-4 mb-6">
            <h3 className="font-bold text-sm text-rh-muted mb-3">📈 Portfolio Value Over Time</h3>
            <LineChartComponent lots={lots} prices={prices} />
          </div>

          {/* Stock table */}
          <div className="bg-rh-card border border-rh-border rounded-xl overflow-hidden mb-6">
            <div className="p-4 border-b border-rh-border flex flex-col sm:flex-row gap-3 items-start sm:items-center justify-between">
              <h3 className="font-bold">All Holdings ({filteredStocks.length})</h3>
              <input
                type="text"
                value={search}
                onChange={e => setSearch(e.target.value)}
                placeholder="🔍 Search ticker or company..."
                className="w-full sm:w-64 px-3 py-2 rounded-lg text-sm"
              />
            </div>
            <div className="overflow-x-auto">
              <table className="w-full">
                <thead>
                  <tr className="text-xs text-rh-dim font-semibold uppercase border-b border-rh-border">
                    <th className="text-left py-2 px-3 cursor-pointer hover:text-rh-text" onClick={() => handleSort('ticker')}>
                      Stock <SortIcon col="ticker" sortBy={sortBy} sortDir={sortDir} />
                    </th>
                    <th className="py-2 px-2 hidden sm:table-cell">Chart</th>
                    <th className="text-right py-2 px-2 cursor-pointer hover:text-rh-text" onClick={() => handleSort('price')}>
                      Price <SortIcon col="price" sortBy={sortBy} sortDir={sortDir} />
                    </th>
                    <th className="text-right py-2 px-2 hidden md:table-cell cursor-pointer hover:text-rh-text" onClick={() => handleSort('value')}>
                      Value <SortIcon col="value" sortBy={sortBy} sortDir={sortDir} />
                    </th>
                    <th className="text-right py-2 px-3 cursor-pointer hover:text-rh-text" onClick={() => handleSort('gainPct')}>
                      Return <SortIcon col="gainPct" sortBy={sortBy} sortDir={sortDir} />
                    </th>
                  </tr>
                </thead>
                <tbody>
                  {filteredStocks.map((s, i) => (
                    <StockRow key={s.ticker} stock={s} priceInfo={prices[s.ticker]} onClick={() => setSelectedStock(s)} rank={i + 1} />
                  ))}
                </tbody>
              </table>
            </div>
          </div>

          {selectedStock && (
            <StockDetailModal stock={selectedStock} lots={lots} priceInfo={prices[selectedStock.ticker]} onClose={() => setSelectedStock(null)} />
          )}
        </div>
      );
    }

    // ─── Add/Edit Lot Form ─────────────────────────────────────────────
    function LotForm({ lot, onSave, onCancel }) {
      const [form, setForm] = useState({
        ticker: lot?.ticker || '', companyName: lot?.companyName || '', shares: lot?.shares || '',
        purchasePrice: lot?.purchasePrice || '', date: lot?.date || new Date().toISOString().split('T')[0],
        notes: lot?.notes || '', dividend: lot?.dividend || '', goal: lot?.goal || '',
      });
      const [fetching, setFetching] = useState(false);
      const [suggestions, setSuggestions] = useState([]);
      const [showSuggestions, setShowSuggestions] = useState(false);
      const [activeField, setActiveField] = useState(null); // 'ticker' or 'company'
      const suggestionsRef = useRef(null);

      const searchStocks = (query, field) => {
        if (!query || query.length < 1) { setSuggestions([]); setShowSuggestions(false); return; }
        const q = query.toLowerCase();
        const matches = SP500_DATA.filter(([ticker, name]) =>
          field === 'ticker' ? ticker.toLowerCase().includes(q) : name.toLowerCase().includes(q)
        ).slice(0, 8);
        setSuggestions(matches);
        setShowSuggestions(matches.length > 0);
        setActiveField(field);
      };

      const selectStock = (ticker, name) => {
        setForm(f => ({ ...f, ticker, companyName: name }));
        setSuggestions([]);
        setShowSuggestions(false);
      };

      const handleTickerChange = (e) => {
        const val = e.target.value;
        setForm(f => ({ ...f, ticker: val }));
        searchStocks(val, 'ticker');
      };

      const handleCompanyChange = (e) => {
        const val = e.target.value;
        setForm(f => ({ ...f, companyName: val }));
        searchStocks(val, 'company');
      };

      const handleTickerBlur = async () => {
        setTimeout(() => { if (activeField === 'ticker') setShowSuggestions(false); }, 200);
        if (form.ticker && !form.companyName) {
          const match = SP500_DATA.find(([t]) => t.toLowerCase() === form.ticker.toLowerCase());
          if (match) { setForm(f => ({ ...f, ticker: match[0], companyName: match[1] })); return; }
          setFetching(true);
          const name = await fetchCompanyName(form.ticker.toUpperCase());
          if (name) setForm(f => ({ ...f, companyName: name }));
          setFetching(false);
        }
      };

      const handleCompanyBlur = () => {
        setTimeout(() => { if (activeField === 'company') setShowSuggestions(false); }, 200);
      };

      const handleSubmit = (e) => {
        e.preventDefault();
        if (!form.ticker || !form.shares || !form.purchasePrice || !form.date) return;
        onSave({
          id: lot?.id || Date.now().toString() + Math.random().toString(36).slice(2, 6),
          ticker: form.ticker.toUpperCase().trim(), companyName: form.companyName.trim(),
          shares: parseFloat(form.shares), purchasePrice: parseFloat(form.purchasePrice),
          date: form.date, notes: form.notes.trim(),
          dividend: form.dividend ? parseFloat(form.dividend) : null,
          goal: form.goal ? parseFloat(form.goal) : null,
        });
      };

      const isValid = form.ticker && form.shares > 0 && form.purchasePrice > 0 && form.date;

      const SuggestionDropdown = () => {
        if (!showSuggestions || suggestions.length === 0) return null;
        return (
          <div ref={suggestionsRef} className="absolute z-50 left-0 right-0 mt-1 bg-rh-surface border border-rh-border rounded-lg shadow-xl overflow-hidden max-h-60 overflow-y-auto">
            {suggestions.map(([ticker, name]) => (
              <button key={ticker} type="button" onMouseDown={() => selectStock(ticker, name)}
                className="w-full px-3 py-2.5 text-left hover:bg-rh-card transition flex items-center gap-2 border-b border-rh-border/30 last:border-0">
                <span className="text-sm">{getEmoji(ticker)}</span>
                <span className="font-bold text-sm text-rh-green">{ticker}</span>
                <span className="text-sm text-rh-muted truncate">{name}</span>
              </button>
            ))}
          </div>
        );
      };

      return (
        <form onSubmit={handleSubmit} className="bg-rh-card border border-rh-border rounded-xl p-6 fade-in">
          <h3 className="font-bold mb-4">{lot ? '✏️ Edit Position' : '➕ Add Stock'}</h3>
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-4">
            <div className="relative">
              <label className="block text-xs font-bold text-rh-dim mb-1 uppercase">Ticker *</label>
              <input type="text" value={form.ticker} onChange={handleTickerChange} onBlur={handleTickerBlur} onFocus={() => searchStocks(form.ticker, 'ticker')}
                placeholder="AAPL" className="w-full px-3 py-2.5 rounded-lg font-bold uppercase" maxLength={10} autoComplete="off" />
              {activeField === 'ticker' && <SuggestionDropdown />}
            </div>
            <div className="relative">
              <label className="block text-xs font-bold text-rh-dim mb-1 uppercase">Company {fetching && <span className="text-rh-green">(looking up...)</span>}</label>
              <input type="text" value={form.companyName} onChange={handleCompanyChange} onBlur={handleCompanyBlur} onFocus={() => searchStocks(form.companyName, 'company')}
                placeholder="Search company name..." className="w-full px-3 py-2.5 rounded-lg" autoComplete="off" />
              {activeField === 'company' && <SuggestionDropdown />}
            </div>
            <div>
              <label className="block text-xs font-bold text-rh-dim mb-1 uppercase">Shares *</label>
              <input type="number" step="any" min="0.001" value={form.shares} onChange={e => setForm({...form, shares: e.target.value})} placeholder="10" className="w-full px-3 py-2.5 rounded-lg font-bold" />
            </div>
            <div>
              <label className="block text-xs font-bold text-rh-dim mb-1 uppercase">Price ($) *</label>
              <input type="number" step="0.01" min="0.01" value={form.purchasePrice} onChange={e => setForm({...form, purchasePrice: e.target.value})} placeholder="150.00" className="w-full px-3 py-2.5 rounded-lg font-bold" />
            </div>
            <div>
              <label className="block text-xs font-bold text-rh-dim mb-1 uppercase">Date *</label>
              <input type="date" value={form.date} onChange={e => setForm({...form, date: e.target.value})} className="w-full px-3 py-2.5 rounded-lg font-bold" />
            </div>
            <div>
              <label className="block text-xs font-bold text-rh-dim mb-1 uppercase">Dividend ($/share/yr)</label>
              <input type="number" step="0.01" min="0" value={form.dividend} onChange={e => setForm({...form, dividend: e.target.value})} placeholder="Optional" className="w-full px-3 py-2.5 rounded-lg" />
            </div>
          </div>
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-4">
            <div>
              <label className="block text-xs font-bold text-rh-dim mb-1 uppercase">Goal ($)</label>
              <input type="number" step="0.01" min="0" value={form.goal} onChange={e => setForm({...form, goal: e.target.value})} placeholder="Target value" className="w-full px-3 py-2.5 rounded-lg" />
            </div>
            <div>
              <label className="block text-xs font-bold text-rh-dim mb-1 uppercase">Notes</label>
              <input type="text" value={form.notes} onChange={e => setForm({...form, notes: e.target.value})} placeholder="Birthday gift" className="w-full px-3 py-2.5 rounded-lg" />
            </div>
          </div>
          <div className="flex gap-3">
            <button type="button" onClick={onCancel} className="flex-1 py-3 rounded-lg border border-rh-border font-bold text-rh-muted hover:bg-rh-surface transition">Cancel</button>
            <button type="submit" disabled={!isValid} className="flex-1 py-3 rounded-lg bg-rh-green text-black font-bold hover:brightness-110 transition disabled:opacity-30">
              {lot ? 'Save' : 'Add Stock'}
            </button>
          </div>
        </form>
      );
    }

    // ─── Manage View ───────────────────────────────────────────────────
    function ManageView({ lots, setLots, prices, accounts, activeAccountId, onAccountsUpdate, onSwitchAccount }) {
      const [showForm, setShowForm] = useState(false);
      const [editingLot, setEditingLot] = useState(null);
      const [search, setSearch] = useState('');
      const [showAccounts, setShowAccounts] = useState(false);

      const handleSave = (lot) => {
        setLots(prev => {
          const exists = prev.findIndex(l => l.id === lot.id);
          if (exists >= 0) { const u = [...prev]; u[exists] = lot; return u; }
          return [...prev, lot];
        });
        setShowForm(false); setEditingLot(null);
      };

      const handleDelete = (id) => { if (confirm('Delete this position?')) setLots(prev => prev.filter(l => l.id !== id)); };

      const activeAccount = accounts.find(a => a.id === activeAccountId);

      const handleExportCSV = () => {
        const headers = ['Ticker','Company','Shares','Purchase Price','Date','Notes','Current Price','Current Value','Gain/Loss','Gain %'];
        const rows = lots.filter(l => l.purchasePrice > 0).map(l => {
          const cp = prices[l.ticker]?.price || ''; const cv = cp ? (cp * l.shares).toFixed(2) : '';
          const gl = cp ? ((cp * l.shares) - (l.purchasePrice * l.shares)).toFixed(2) : '';
          const pct = cp && l.purchasePrice ? (((cp - l.purchasePrice) / l.purchasePrice) * 100).toFixed(2) + '%' : '';
          return [l.ticker, l.companyName, l.shares, l.purchasePrice, l.date, l.notes || '', cp, cv, gl, pct];
        });
        const csv = [headers, ...rows].map(r => r.map(c => `"${c}"`).join(',')).join('\n');
        const blob = new Blob([csv], { type: 'text/csv' });
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `${activeAccount?.name || 'portfolio'}-stocks.csv`; a.click();
      };

      const handleReset = () => {
        if (!activeAccountId) return;
        if (confirm(`Reset "${activeAccount?.name}" to default S&P 500? This cannot be undone.`)) {
          localStorage.removeItem(`stockTrackerInitialized_${activeAccountId}`);
          localStorage.removeItem(`stockTrackerLots_${activeAccountId}`);
          const newLots = initializePortfolio(activeAccountId);
          setLots(newLots);
        }
      };

      const filteredLots = useMemo(() => {
        if (!search) return lots.filter(l => l.purchasePrice > 0);
        const q = search.toLowerCase();
        return lots.filter(l => l.purchasePrice > 0 && (l.ticker.toLowerCase().includes(q) || l.companyName.toLowerCase().includes(q)));
      }, [lots, search]);

      const grouped = useMemo(() => {
        const map = {};
        filteredLots.forEach(l => {
          if (!map[l.ticker]) map[l.ticker] = { ticker: l.ticker, companyName: l.companyName, lots: [], totalShares: 0, totalCost: 0 };
          map[l.ticker].lots.push(l);
          map[l.ticker].totalShares += l.shares;
          map[l.ticker].totalCost += l.shares * l.purchasePrice;
          if (l.companyName) map[l.ticker].companyName = l.companyName;
        });
        return Object.values(map);
      }, [filteredLots]);

      return (
        <div className="max-w-5xl mx-auto p-4 pb-24">
          <div className="flex flex-wrap items-center justify-between gap-3 mb-6">
            <h2 className="text-2xl font-black">⚙️ Manage Portfolio</h2>
            <div className="flex gap-2 flex-wrap">
              <button onClick={handleExportCSV} className="px-3 py-2 bg-rh-surface border border-rh-border rounded-lg font-bold text-xs text-rh-muted hover:bg-rh-card transition">📄 CSV</button>
              <button onClick={() => setShowAccounts(!showAccounts)} className={`px-3 py-2 bg-rh-surface border border-rh-border rounded-lg font-bold text-xs transition ${showAccounts ? 'text-rh-green border-rh-green' : 'text-rh-muted hover:bg-rh-card'}`}>👥 Accounts</button>
              <button onClick={handleReset} className="px-3 py-2 bg-rh-surface border border-rh-border rounded-lg font-bold text-xs text-rh-muted hover:bg-rh-card transition">🔄 Reset</button>
              <button onClick={() => { setShowForm(true); setEditingLot(null); }} className="px-3 py-2 bg-rh-green text-black rounded-lg font-bold text-xs hover:brightness-110 transition">+ Add</button>
            </div>
          </div>

          {showAccounts && (
            <AccountManager accounts={accounts} activeAccountId={activeAccountId} onUpdate={onAccountsUpdate} onSwitch={onSwitchAccount} prices={prices} />
          )}

          {(showForm || editingLot) && (
            <div className="mb-6"><LotForm lot={editingLot} onSave={handleSave} onCancel={() => { setShowForm(false); setEditingLot(null); }} /></div>
          )}

          <input type="text" value={search} onChange={e => setSearch(e.target.value)} placeholder="🔍 Search stocks..." className="w-full px-3 py-2.5 rounded-lg text-sm mb-4" />

          <div className="space-y-3">
            {grouped.map(group => {
              const currentPrice = prices[group.ticker]?.price;
              const currentValue = currentPrice ? currentPrice * group.totalShares : group.totalCost;
              const gainLoss = currentValue - group.totalCost;
              const pct = group.totalCost > 0 ? (gainLoss / group.totalCost) * 100 : 0;
              const isGain = gainLoss >= 0;

              return (
                <div key={group.ticker} className="bg-rh-card border border-rh-border rounded-xl overflow-hidden fade-in">
                  <div className="p-3 flex flex-wrap items-center justify-between gap-2 border-b border-rh-border/50">
                    <div className="flex items-center gap-2">
                      <span>{getEmoji(group.ticker)}</span>
                      <div>
                        <span className="font-bold text-sm">{group.ticker}</span>
                        <span className="text-rh-dim text-xs ml-2">{group.totalShares} shares</span>
                      </div>
                    </div>
                    <div className="flex items-center gap-3">
                      <span className="font-bold text-sm">{formatCurrency(currentValue)}</span>
                      <span className={`text-xs font-bold ${isGain ? 'text-rh-green' : 'text-rh-red'}`}>{formatPercent(pct)}</span>
                    </div>
                  </div>
                  {group.lots.some(l => l.goal) && (() => {
                    const goalLot = group.lots.find(l => l.goal);
                    const progress = Math.min(100, (currentValue / goalLot.goal) * 100);
                    return (
                      <div className="px-3 py-2 border-b border-rh-border/30">
                        <div className="flex justify-between text-xs font-bold text-rh-dim mb-1">
                          <span>🎯 Goal: {formatCurrency(goalLot.goal)}</span><span>{progress.toFixed(0)}%</span>
                        </div>
                        <div className="w-full bg-rh-surface rounded-full h-1.5">
                          <div className="bg-rh-green h-1.5 rounded-full transition-all" style={{width:`${progress}%`}}></div>
                        </div>
                      </div>
                    );
                  })()}
                  {group.lots.map(lot => (
                    <div key={lot.id} className="px-3 py-2 flex flex-wrap items-center justify-between gap-2 border-b border-rh-border/20 last:border-0 hover:bg-rh-surface/30 transition text-sm">
                      <div>
                        <span className="font-semibold">{lot.shares} @ {formatCurrency(lot.purchasePrice)}</span>
                        <span className="text-rh-dim ml-2 text-xs">{formatDate(lot.date)}</span>
                        {lot.notes && <span className="text-rh-dim text-xs ml-2">({lot.notes})</span>}
                      </div>
                      <div className="flex items-center gap-2">
                        <button onClick={() => { setEditingLot(lot); setShowForm(false); }} className="text-rh-dim hover:text-rh-green transition text-xs">✏️</button>
                        <button onClick={() => handleDelete(lot.id)} className="text-rh-dim hover:text-rh-red transition text-xs">🗑️</button>
                      </div>
                    </div>
                  ))}
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ─── Account Switcher (nav pills) ─────────────────────────────────
    function AccountSwitcher({ accounts, activeAccountId, onSwitch, onAdd }) {
      return (
        <div className="flex items-center gap-1.5">
          {accounts.map(acct => (
            <button key={acct.id} onClick={() => onSwitch(acct.id)} title={acct.name}
              className={`w-9 h-9 rounded-full flex items-center justify-center text-base font-bold transition-all ${acct.id === activeAccountId ? 'ring-2 ring-offset-2 ring-offset-rh-bg scale-110' : 'opacity-50 hover:opacity-80'}`}
              style={{ backgroundColor: acct.color + '22', borderColor: acct.color, border: `2px solid ${acct.color}`, ...(acct.id === activeAccountId ? { boxShadow: `0 0 12px ${acct.color}44`, ringColor: acct.color } : {}) }}>
              {acct.emoji}
            </button>
          ))}
          {accounts.length < 4 && (
            <button onClick={onAdd} className="w-9 h-9 rounded-full border-2 border-dashed border-rh-dim flex items-center justify-center text-rh-dim hover:border-rh-muted hover:text-rh-muted transition text-lg" title="Add account">
              +
            </button>
          )}
        </div>
      );
    }

    // ─── Account Form (create/edit) ─────────────────────────────────────
    function AccountForm({ account, onSave, onCancel, usedColors }) {
      const [name, setName] = useState(account?.name || '');
      const [type, setType] = useState(account?.type || 'kid');
      const [emoji, setEmoji] = useState(account?.emoji || '🚀');
      const [color, setColor] = useState(account?.color || ACCENT_COLORS.find(c => !usedColors.includes(c)) || ACCENT_COLORS[0]);
      const [initSP500, setInitSP500] = useState(!account);

      const handleSubmit = (e) => {
        e.preventDefault();
        if (!name.trim()) return;
        onSave({ name: name.trim(), type, emoji, color, initSP500: !account && initSP500 });
      };

      return (
        <div className="bg-rh-card border border-rh-border rounded-xl p-6 fade-in">
          <h3 className="font-bold text-lg mb-4">{account ? '✏️ Edit Account' : '➕ New Account'}</h3>
          <form onSubmit={handleSubmit}>
            <div className="mb-4">
              <label className="block text-xs font-bold text-rh-dim mb-1 uppercase">Name *</label>
              <input type="text" value={name} onChange={e => setName(e.target.value)} placeholder="e.g. Sophia" className="w-full px-3 py-2.5 rounded-lg font-bold" maxLength={20} />
            </div>
            <div className="mb-4">
              <label className="block text-xs font-bold text-rh-dim mb-1 uppercase">Type</label>
              <div className="flex gap-2">
                <button type="button" onClick={() => setType('kid')} className={`flex-1 py-2 rounded-lg font-bold text-sm transition ${type === 'kid' ? 'bg-rh-blue text-black' : 'bg-rh-surface border border-rh-border text-rh-muted'}`}>
                  👦 Kid
                </button>
                <button type="button" onClick={() => setType('adult')} className={`flex-1 py-2 rounded-lg font-bold text-sm transition ${type === 'adult' ? 'bg-rh-blue text-black' : 'bg-rh-surface border border-rh-border text-rh-muted'}`}>
                  👨 Adult
                </button>
              </div>
            </div>
            <div className="mb-4">
              <label className="block text-xs font-bold text-rh-dim mb-1 uppercase">Avatar</label>
              <div className="grid grid-cols-8 gap-1.5">
                {AVATAR_EMOJIS.map(e => (
                  <button key={e} type="button" onClick={() => setEmoji(e)}
                    className={`w-10 h-10 rounded-lg flex items-center justify-center text-lg transition ${emoji === e ? 'bg-rh-surface ring-2 ring-rh-green scale-110' : 'hover:bg-rh-surface/50'}`}>
                    {e}
                  </button>
                ))}
              </div>
            </div>
            <div className="mb-4">
              <label className="block text-xs font-bold text-rh-dim mb-1 uppercase">Color</label>
              <div className="flex gap-2">
                {ACCENT_COLORS.map(c => (
                  <button key={c} type="button" onClick={() => setColor(c)}
                    className={`w-10 h-10 rounded-full transition ${color === c ? 'ring-2 ring-offset-2 ring-offset-rh-bg scale-110' : 'opacity-60 hover:opacity-90'}`}
                    style={{ backgroundColor: c, ringColor: c }} />
                ))}
              </div>
            </div>
            {!account && (
              <label className="flex items-center gap-2 mb-4 cursor-pointer">
                <input type="checkbox" checked={initSP500} onChange={e => setInitSP500(e.target.checked)} className="w-4 h-4 accent-green-500" />
                <span className="text-sm text-rh-muted font-semibold">Start with S&P 500 portfolio (490 stocks from Nov 2017)</span>
              </label>
            )}
            <div className="flex gap-3">
              <button type="button" onClick={onCancel} className="flex-1 py-3 rounded-lg border border-rh-border font-bold text-rh-muted hover:bg-rh-surface transition">Cancel</button>
              <button type="submit" disabled={!name.trim()} className="flex-1 py-3 rounded-lg bg-rh-green text-black font-bold hover:brightness-110 transition disabled:opacity-30">
                {account ? 'Save' : 'Create Account'}
              </button>
            </div>
          </form>
        </div>
      );
    }

    // ─── Account Manager Panel ──────────────────────────────────────────
    function AccountManager({ accounts, activeAccountId, onUpdate, onSwitch, prices }) {
      const [showForm, setShowForm] = useState(false);
      const [editingAccount, setEditingAccount] = useState(null);

      const handleSave = (formData) => {
        const acctData = loadAccounts();
        if (editingAccount) {
          const idx = acctData.accounts.findIndex(a => a.id === editingAccount.id);
          if (idx >= 0) {
            acctData.accounts[idx] = { ...acctData.accounts[idx], name: formData.name, type: formData.type, emoji: formData.emoji, color: formData.color };
          }
        } else {
          const newId = generateAccountId();
          const newAcct = { id: newId, name: formData.name, type: formData.type, emoji: formData.emoji, color: formData.color };
          acctData.accounts.push(newAcct);
          if (formData.initSP500) initializePortfolio(newId);
          else { savePortfolio([], newId); localStorage.setItem(`stockTrackerInitialized_${newId}`, 'true'); }
        }
        saveAccounts(acctData);
        onUpdate(acctData);
        setShowForm(false);
        setEditingAccount(null);
      };

      const handleDelete = (acct) => {
        if (!confirm(`Delete "${acct.name}"? This will remove all their stocks.`)) return;
        const acctData = loadAccounts();
        acctData.accounts = acctData.accounts.filter(a => a.id !== acct.id);
        localStorage.removeItem(`stockTrackerLots_${acct.id}`);
        localStorage.removeItem(`stockTrackerInitialized_${acct.id}`);
        if (acctData.activeAccountId === acct.id && acctData.accounts.length > 0) {
          acctData.activeAccountId = acctData.accounts[0].id;
        }
        saveAccounts(acctData);
        onUpdate(acctData);
        if (acct.id === activeAccountId && acctData.accounts.length > 0) onSwitch(acctData.accounts[0].id);
      };

      const usedColors = accounts.filter(a => a.id !== editingAccount?.id).map(a => a.color);

      return (
        <div className="mb-6">
          <div className="flex items-center justify-between mb-3">
            <h3 className="font-bold text-sm text-rh-muted uppercase">Accounts ({accounts.length}/4)</h3>
            {accounts.length < 4 && !showForm && !editingAccount && (
              <button onClick={() => setShowForm(true)} className="px-3 py-1.5 bg-rh-green text-black rounded-lg font-bold text-xs hover:brightness-110 transition">+ Add</button>
            )}
          </div>
          {(showForm || editingAccount) && (
            <div className="mb-4">
              <AccountForm account={editingAccount} onSave={handleSave} onCancel={() => { setShowForm(false); setEditingAccount(null); }} usedColors={usedColors} />
            </div>
          )}
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
            {accounts.map(acct => {
              const lots = loadPortfolio(acct.id);
              let totalValue = 0, totalCost = 0;
              lots.forEach(l => { totalCost += l.shares * l.purchasePrice; const p = prices[l.ticker]?.price; totalValue += p ? p * l.shares : l.shares * l.purchasePrice; });
              const isActive = acct.id === activeAccountId;
              return (
                <div key={acct.id} className={`bg-rh-card border rounded-xl p-4 cursor-pointer transition hover:bg-rh-surface/50 ${isActive ? 'border-2' : 'border-rh-border'}`}
                  style={isActive ? { borderColor: acct.color } : {}} onClick={() => onSwitch(acct.id)}>
                  <div className="flex items-center justify-between mb-2">
                    <div className="flex items-center gap-2">
                      <span className="text-2xl">{acct.emoji}</span>
                      <div>
                        <p className="font-bold text-sm">{acct.name}</p>
                        <span className={`text-xs font-semibold px-1.5 py-0.5 rounded ${acct.type === 'kid' ? 'bg-blue-900/40 text-rh-blue' : 'bg-purple-900/40 text-purple-400'}`}>
                          {acct.type === 'kid' ? '👦 Kid' : '👨 Adult'}
                        </span>
                      </div>
                    </div>
                    <div className="flex gap-1" onClick={e => e.stopPropagation()}>
                      <button onClick={() => { setEditingAccount(acct); setShowForm(false); }} className="p-1.5 rounded-lg hover:bg-rh-surface text-rh-dim hover:text-rh-text transition text-xs">✏️</button>
                      {accounts.length > 1 && <button onClick={() => handleDelete(acct)} className="p-1.5 rounded-lg hover:bg-rh-surface text-rh-dim hover:text-rh-red transition text-xs">🗑️</button>}
                    </div>
                  </div>
                  <div className="flex items-end justify-between">
                    <div>
                      <p className="text-lg font-black" style={{ color: acct.color }}>{formatCurrency(totalValue)}</p>
                      <p className="text-xs text-rh-dim">{lots.length} positions</p>
                    </div>
                    {totalCost > 0 && (
                      <span className={`text-xs font-bold ${totalValue >= totalCost ? 'text-rh-green' : 'text-rh-red'}`}>
                        {formatPercent((totalValue - totalCost) / totalCost * 100)}
                      </span>
                    )}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ─── Compare View ───────────────────────────────────────────────────
    const TIME_HORIZONS = [
      { label: '1W', range: '5d', interval: '1d' },
      { label: '1M', range: '1mo', interval: '1d' },
      { label: '3M', range: '3mo', interval: '1d' },
      { label: '6M', range: '6mo', interval: '1d' },
      { label: '1Y', range: '1y', interval: '1d' },
      { label: 'ALL', range: 'max', interval: '1wk' },
    ];

    function CompareView({ accounts, prices }) {
      const canvasBarRef = useRef(null);
      const canvasLineRef = useRef(null);
      const chartBarRef = useRef(null);
      const chartLineRef = useRef(null);
      const [selectedHorizon, setSelectedHorizon] = useState('1M');
      const [historicalData, setHistoricalData] = useState(null);
      const [loadingHistory, setLoadingHistory] = useState(false);
      const fetchCacheRef = useRef({});

      const accountData = useMemo(() => accounts.map(acct => {
        const lots = loadPortfolio(acct.id);
        let totalCost = 0, totalValue = 0, holdings = 0;
        lots.forEach(l => {
          if (l.purchasePrice <= 0) return;
          totalCost += l.shares * l.purchasePrice;
          const p = prices[l.ticker]?.price;
          totalValue += p ? p * l.shares : l.shares * l.purchasePrice;
          holdings++;
        });
        const gain = totalValue - totalCost;
        const pct = totalCost > 0 ? (gain / totalCost) * 100 : 0;
        return { ...acct, lots, totalCost, totalValue, gain, pct, holdings };
      }), [accounts, prices]);

      // Build sparkline-based growth data from already-loaded prices (no API calls needed)
      const sparklineGrowth = useMemo(() => {
        if (Object.keys(prices).length === 0) return null;
        // Find the max sparkline length and reference timestamps
        let maxLen = 0;
        let refTimestamps = null;
        Object.values(prices).forEach(p => {
          if (p.sparkline && p.sparkline.length > maxLen) {
            maxLen = p.sparkline.length;
            if (p.sparklineTimestamps && p.sparklineTimestamps.length === p.sparkline.length) {
              refTimestamps = p.sparklineTimestamps;
            }
          }
        });
        if (maxLen < 2) return null;
        return { maxLen, refTimestamps };
      }, [prices]);

      // Fetch historical data for non-1M horizons
      useEffect(() => {
        if (selectedHorizon === '1M') { setHistoricalData(null); setLoadingHistory(false); return; }
        if (accounts.length < 2) return;
        const horizon = TIME_HORIZONS.find(h => h.label === selectedHorizon);
        if (!horizon) return;

        // Check cache
        if (fetchCacheRef.current[selectedHorizon]) {
          setHistoricalData(fetchCacheRef.current[selectedHorizon]);
          return;
        }

        // Gather unique tickers across all accounts
        const tickerSet = new Set();
        accounts.forEach(acct => {
          loadPortfolio(acct.id).forEach(l => { if (l.purchasePrice > 0) tickerSet.add(l.ticker); });
        });
        const tickers = [...tickerSet];
        if (tickers.length === 0) return;

        let cancelled = false;
        setLoadingHistory(true);
        setHistoricalData(null);
        fetchSparkRange(tickers, horizon.range, horizon.interval).then(data => {
          if (!cancelled) {
            fetchCacheRef.current[selectedHorizon] = data;
            setHistoricalData(data);
            setLoadingHistory(false);
          }
        }).catch(() => { if (!cancelled) setLoadingHistory(false); });
        return () => { cancelled = true; };
      }, [selectedHorizon, accounts]);

      // Performance bar chart
      useEffect(() => {
        if (!canvasBarRef.current || accountData.length === 0) return;
        if (chartBarRef.current) chartBarRef.current.destroy();
        chartBarRef.current = new Chart(canvasBarRef.current, {
          type: 'bar',
          data: {
            labels: accountData.map(a => a.emoji + ' ' + a.name),
            datasets: [{
              data: accountData.map(a => a.pct),
              backgroundColor: accountData.map(a => a.color),
              borderRadius: 6,
              borderSkipped: false,
              barPercentage: 0.6,
            }]
          },
          options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { display: false }, tooltip: { callbacks: { label: c => `${c.parsed.y >= 0 ? '+' : ''}${c.parsed.y.toFixed(2)}%` } } },
            scales: {
              y: { ticks: { callback: v => v + '%', color: '#8b949e' }, grid: { color: '#1c233380' } },
              x: { ticks: { font: { weight: '700', size: 12 }, color: '#f0f6fc' }, grid: { display: false } }
            }
          }
        });
        return () => { if (chartBarRef.current) chartBarRef.current.destroy(); };
      }, [accountData]);

      // Growth line chart
      useEffect(() => {
        if (!canvasLineRef.current || accountData.length === 0) return;
        if (chartLineRef.current) chartLineRef.current.destroy();

        let labels, datasets;

        if (selectedHorizon === '1M') {
          // Use already-loaded sparkline data from prices — instant, no API calls
          if (!sparklineGrowth) return;
          const numPoints = sparklineGrowth.maxLen;

          // Use real timestamps if available, otherwise approximate
          const labelsArr = [];
          if (sparklineGrowth.refTimestamps && sparklineGrowth.refTimestamps.length === numPoints) {
            for (let i = 0; i < numPoints; i++) {
              const d = new Date(sparklineGrowth.refTimestamps[i]);
              labelsArr.push(d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }));
            }
          } else {
            const today = new Date();
            for (let i = numPoints - 1; i >= 0; i--) {
              const d = new Date(today);
              d.setDate(d.getDate() - Math.round(i * 30 / numPoints));
              labelsArr.push(d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }));
            }
          }
          labels = labelsArr;

          datasets = accountData.map(acct => {
            const values = [];
            for (let i = 0; i < numPoints; i++) {
              let total = 0;
              acct.lots.forEach(lot => {
                if (lot.purchasePrice <= 0) return;
                const spark = prices[lot.ticker]?.sparkline;
                if (spark && spark.length > 0) {
                  // Align sparklines from the right (most recent)
                  const idx = i - (numPoints - spark.length);
                  const price = idx >= 0 && idx < spark.length && spark[idx] != null
                    ? spark[idx]
                    : (idx < 0 ? spark[0] : spark[spark.length - 1]);
                  total += lot.shares * price;
                } else {
                  total += lot.shares * (prices[lot.ticker]?.price || lot.purchasePrice);
                }
              });
              values.push(total);
            }
            return {
              label: acct.emoji + ' ' + acct.name,
              data: values,
              borderColor: acct.color,
              backgroundColor: acct.color + '15',
              fill: false, tension: 0.3, pointRadius: 0, borderWidth: 2.5,
            };
          });
        } else {
          // Use fetched historical data for other horizons
          if (!historicalData || Object.keys(historicalData).length === 0) return;

          const tsSet = new Set();
          Object.values(historicalData).forEach(d => d.timestamps.forEach(t => tsSet.add(t)));
          const allTimestamps = [...tsSet].sort((a, b) => a - b);
          if (allTimestamps.length === 0) return;

          // Build ticker -> timestamp -> price lookup
          const tickerPriceMap = {};
          Object.entries(historicalData).forEach(([ticker, d]) => {
            const map = {};
            d.timestamps.forEach((t, i) => { if (d.closes[i] != null) map[t] = d.closes[i]; });
            tickerPriceMap[ticker] = map;
          });

          function getPriceAt(ticker, ts) {
            const map = tickerPriceMap[ticker];
            if (!map) return null;
            if (map[ts] != null) return map[ts];
            const hd = historicalData[ticker];
            for (let i = hd.timestamps.length - 1; i >= 0; i--) {
              if (hd.timestamps[i] <= ts && hd.closes[i] != null) return hd.closes[i];
            }
            return null;
          }

          const isShort = selectedHorizon === '1W';
          labels = allTimestamps.map(t => {
            const d = new Date(t * 1000);
            return isShort
              ? d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })
              : d.toLocaleDateString('en-US', { month: 'short', year: '2-digit' });
          });

          datasets = accountData.map(acct => {
            const values = allTimestamps.map(ts => {
              let total = 0;
              acct.lots.forEach(lot => {
                if (lot.purchasePrice <= 0) return;
                const lotDate = new Date(lot.date).getTime() / 1000;
                if (lotDate > ts) return;
                const price = getPriceAt(lot.ticker, ts);
                total += lot.shares * (price != null ? price : lot.purchasePrice);
              });
              return total;
            });
            return {
              label: acct.emoji + ' ' + acct.name,
              data: values,
              borderColor: acct.color,
              backgroundColor: acct.color + '15',
              fill: false, tension: 0.3, pointRadius: 0, borderWidth: 2.5,
            };
          });
        }

        chartLineRef.current = new Chart(canvasLineRef.current, {
          type: 'line',
          data: { labels, datasets },
          options: {
            responsive: true, maintainAspectRatio: false,
            interaction: { intersect: false, mode: 'index' },
            plugins: {
              legend: { labels: { font: { weight: '600', size: 12 }, usePointStyle: true, padding: 16, color: '#f0f6fc' } },
              tooltip: { callbacks: { label: c => ` ${c.dataset.label}: ${formatCurrency(c.parsed.y)}` } }
            },
            scales: {
              y: {
                beginAtZero: false,
                ticks: {
                  callback: v => {
                    if (v >= 1000000) return '$' + (v/1000000).toFixed(1) + 'M';
                    if (v >= 10000) return '$' + (v/1000).toFixed(1) + 'k';
                    if (v >= 1000) return '$' + (v/1000).toFixed(2) + 'k';
                    return '$' + v.toFixed(0);
                  },
                  color: '#8b949e'
                },
                grid: { color: '#1c233380' }
              },
              x: { ticks: { maxTicksLimit: 12, font: { size: 10 }, color: '#8b949e' }, grid: { display: false } }
            }
          }
        });
        return () => { if (chartLineRef.current) chartLineRef.current.destroy(); };
      }, [accountData, prices, sparklineGrowth, historicalData, selectedHorizon]);

      if (accounts.length < 2) {
        return (
          <div className="max-w-5xl mx-auto p-4 pb-24">
            <div className="flex flex-col items-center justify-center py-16 text-center">
              <div className="text-6xl mb-4">📊</div>
              <h2 className="text-2xl font-black mb-2">Compare Portfolios</h2>
              <p className="text-rh-muted">Add at least 2 accounts to compare performance.</p>
            </div>
          </div>
        );
      }

      return (
        <div className="max-w-5xl mx-auto p-4 pb-24">
          <h2 className="text-2xl font-black mb-6">📊 Compare Portfolios</h2>

          {/* Summary cards */}
          <div className={`grid gap-3 mb-6 ${accountData.length <= 2 ? 'grid-cols-2' : accountData.length === 3 ? 'grid-cols-3' : 'grid-cols-2 sm:grid-cols-4'}`}>
            {accountData.map(acct => (
              <div key={acct.id} className="bg-rh-card border-2 rounded-xl p-4" style={{ borderColor: acct.color }}>
                <div className="flex items-center gap-2 mb-2">
                  <span className="text-xl">{acct.emoji}</span>
                  <span className="font-bold text-sm truncate">{acct.name}</span>
                </div>
                <p className="text-xl font-black" style={{ color: acct.color }}>{formatCurrency(acct.totalValue)}</p>
                <p className={`text-sm font-bold ${acct.gain >= 0 ? 'text-rh-green' : 'text-rh-red'}`}>
                  {formatPercent(acct.pct)}
                </p>
                <p className="text-xs text-rh-dim mt-1">{acct.holdings} holdings</p>
              </div>
            ))}
          </div>

          {/* Performance comparison bar chart */}
          <div className="bg-rh-card border border-rh-border rounded-xl p-4 mb-6">
            <h3 className="font-bold text-sm text-rh-muted mb-3">📈 Total Return %</h3>
            <div className="chart-container" style={{ height: '250px' }}><canvas ref={canvasBarRef} /></div>
          </div>

          {/* Growth over time with time horizon selector */}
          <div className="bg-rh-card border border-rh-border rounded-xl p-4 mb-6">
            <div className="flex items-center justify-between mb-3">
              <h3 className="font-bold text-sm text-rh-muted">📈 Portfolio Growth Over Time</h3>
              <div className="flex gap-1">
                {TIME_HORIZONS.map(h => (
                  <button
                    key={h.label}
                    onClick={() => setSelectedHorizon(h.label)}
                    className={`px-3 py-1 rounded-full text-xs font-bold transition-all ${
                      selectedHorizon === h.label
                        ? 'bg-rh-green text-black'
                        : 'bg-rh-border text-rh-muted hover:text-white'
                    }`}
                  >
                    {h.label}
                  </button>
                ))}
              </div>
            </div>
            {loadingHistory ? (
              <div className="flex items-center justify-center py-12">
                <div className="animate-spin rounded-full h-8 w-8 border-2 border-rh-green border-t-transparent mr-3"></div>
                <span className="text-rh-muted text-sm">Loading historical prices...</span>
              </div>
            ) : (
              <div className="chart-container" style={{ height: '300px' }}><canvas ref={canvasLineRef} /></div>
            )}
          </div>
        </div>
      );
    }

    // ─── Main App ──────────────────────────────────────────────────────
    function App() {
      const [view, setView] = useState('kids');
      const [accountsData, setAccountsData] = useState(null);
      const [activeAccountId, setActiveAccountId] = useState(null);
      const [lots, setLots] = useState([]);
      const [prices, setPrices] = useState(loadPrices);
      const [loading, setLoading] = useState(true);
      const [lastUpdated, setLastUpdated] = useState(null);
      const [initPhase, setInitPhase] = useState(null);
      const [initProgress, setInitProgress] = useState(0);
      const [initTotal, setInitTotal] = useState(0);
      const [showNewAccount, setShowNewAccount] = useState(false);

      // Initialize on mount
      useEffect(() => {
        const init = async () => {
          // Migrate or load accounts
          const acctData = migrateToMultiAccount();
          setAccountsData(acctData);
          const activeId = acctData.activeAccountId;
          setActiveAccountId(activeId);

          // Load active account's portfolio
          const portfolio = initializePortfolio(activeId);
          setLots(portfolio);

          // Gather all tickers across all accounts for price fetching
          const allTickers = new Set();
          acctData.accounts.forEach(acct => {
            loadPortfolio(acct.id).forEach(l => allTickers.add(l.ticker));
          });
          const tickerList = [...allTickers];

          const cached = loadPrices();
          const hasCachedPrices = Object.keys(cached).length > 10;

          if (hasCachedPrices) {
            setPrices(cached);
            setInitPhase(null);
            setLoading(false);
            setLastUpdated('cached');
            fetchPricesBatch(tickerList, () => {}).then(p => {
              if (Object.keys(p).length > Object.keys(cached).length) {
                setPrices(p);
                setLastUpdated(new Date().toLocaleTimeString());
              }
            });
          } else {
            setInitPhase('current');
            setInitProgress(0);
            setInitTotal(tickerList.length);
            const fetchPromise = fetchPricesBatch(tickerList, (p, t) => { setInitProgress(p); setInitTotal(t); });
            const timeoutPromise = new Promise(r => setTimeout(() => r(null), 20000));
            const result = await Promise.race([fetchPromise, timeoutPromise]);
            if (result && Object.keys(result).length > 0) {
              setPrices(result);
              setLastUpdated(new Date().toLocaleTimeString());
            }
            setInitPhase(null);
            setLoading(false);
          }
        };
        init();
      }, []);

      // Save lots whenever they change (to active account)
      useEffect(() => {
        if (lots.length > 0 && activeAccountId) savePortfolio(lots, activeAccountId);
      }, [lots, activeAccountId]);

      // Aggregate stocks
      const stocks = useMemo(() => {
        const map = {};
        lots.forEach(l => {
          if (!map[l.ticker]) map[l.ticker] = { ticker: l.ticker, companyName: l.companyName, totalShares: 0, totalCost: 0, avgCost: 0 };
          map[l.ticker].totalShares += l.shares;
          map[l.ticker].totalCost += l.shares * l.purchasePrice;
          if (l.companyName) map[l.ticker].companyName = l.companyName;
        });
        Object.values(map).forEach(s => { s.avgCost = s.totalShares > 0 ? s.totalCost / s.totalShares : 0; });
        return Object.values(map);
      }, [lots]);

      const refreshPrices = useCallback(async () => {
        // Gather tickers from ALL accounts
        const allTickers = new Set();
        if (accountsData) {
          accountsData.accounts.forEach(acct => {
            loadPortfolio(acct.id).forEach(l => allTickers.add(l.ticker));
          });
        }
        const tickerList = [...allTickers];
        if (!tickerList.length) return;
        setLoading(true);
        const newPrices = await fetchPricesBatch(tickerList, () => {});
        setPrices(newPrices);
        setLastUpdated(new Date().toLocaleTimeString());
        setLoading(false);
      }, [accountsData]);

      const switchAccount = useCallback((newId) => {
        if (newId === activeAccountId) return;
        // Save current lots before switching
        if (activeAccountId && lots.length > 0) savePortfolio(lots, activeAccountId);
        setActiveAccountId(newId);
        setLots(loadPortfolio(newId));
        // Update active in storage
        const acctData = loadAccounts();
        if (acctData) { acctData.activeAccountId = newId; saveAccounts(acctData); setAccountsData(acctData); }
      }, [activeAccountId, lots]);

      const handleAddAccount = useCallback((formData) => {
        const acctData = loadAccounts();
        const newId = generateAccountId();
        const newAcct = { id: newId, name: formData.name, type: formData.type, emoji: formData.emoji, color: formData.color };
        acctData.accounts.push(newAcct);
        if (formData.initSP500) initializePortfolio(newId);
        else { savePortfolio([], newId); localStorage.setItem(`stockTrackerInitialized_${newId}`, 'true'); }
        saveAccounts(acctData);
        setAccountsData(acctData);
        setShowNewAccount(false);
        switchAccount(newId);
      }, [switchAccount]);

      const activeAccount = accountsData?.accounts.find(a => a.id === activeAccountId);

      if (initPhase) {
        return <InitScreen progress={initProgress} total={initTotal} phase={initPhase} />;
      }

      if (!accountsData) return null;

      return (
        <div className="min-h-screen">
          {/* Nav */}
          <nav className="bg-rh-card/90 backdrop-blur-lg border-b border-rh-border sticky top-0 z-40">
            <div className="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
              <div className="flex items-center gap-3">
                <AccountSwitcher accounts={accountsData.accounts} activeAccountId={activeAccountId} onSwitch={switchAccount} onAdd={() => setShowNewAccount(true)} />
              </div>
              <div className="flex items-center gap-2">
                <div className="flex bg-rh-surface rounded-lg p-0.5 border border-rh-border">
                  <button onClick={() => { setView('kids'); setShowNewAccount(false); }} className={`px-2.5 py-1.5 rounded-md text-xs font-bold transition ${view === 'kids' ? 'bg-rh-green text-black' : 'text-rh-muted'}`}>
                    📊 Portfolio
                  </button>
                  <button onClick={() => { setView('compare'); setShowNewAccount(false); }} className={`px-2.5 py-1.5 rounded-md text-xs font-bold transition ${view === 'compare' ? 'bg-rh-green text-black' : 'text-rh-muted'}`}>
                    📈 Compare
                  </button>
                  <button onClick={() => { setView('manage'); setShowNewAccount(false); }} className={`px-2.5 py-1.5 rounded-md text-xs font-bold transition ${view === 'manage' ? 'bg-rh-green text-black' : 'text-rh-muted'}`}>
                    ⚙️ Manage
                  </button>
                </div>
                <button onClick={refreshPrices} disabled={loading} className="p-2 rounded-lg hover:bg-rh-surface transition text-sm border border-rh-border" title="Refresh">
                  <span className={loading ? 'inline-block animate-spin' : ''}>🔄</span>
                </button>
              </div>
            </div>
            {activeAccount && (
              <div className="max-w-5xl mx-auto px-4 pb-2 flex items-center justify-between">
                <p className="text-sm font-bold" style={{ color: activeAccount.color }}>
                  {activeAccount.emoji} {activeAccount.name}'s Portfolio
                </p>
                {lastUpdated && <p className="text-xs text-rh-dim">Updated {lastUpdated} <span className="text-rh-green">●</span></p>}
              </div>
            )}
          </nav>

          {/* New account form overlay */}
          {showNewAccount && (
            <div className="max-w-md mx-auto p-4 mt-4">
              <AccountForm account={null} onSave={handleAddAccount} onCancel={() => setShowNewAccount(false)} usedColors={accountsData.accounts.map(a => a.color)} />
            </div>
          )}

          {!showNewAccount && view === 'kids' && (
            <KidsDashboard lots={lots} stocks={stocks} prices={prices} loading={loading} onGoToManage={() => setView('manage')} />
          )}
          {!showNewAccount && view === 'compare' && (
            <CompareView accounts={accountsData.accounts} prices={prices} />
          )}
          {!showNewAccount && view === 'manage' && (
            <ManageView lots={lots} setLots={setLots} prices={prices} accounts={accountsData.accounts} activeAccountId={activeAccountId} onAccountsUpdate={setAccountsData} onSwitchAccount={switchAccount} />
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
